<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*; img-src 'self' data:; font-src 'self';" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Student Task Manager</title>
    <style>
      #loading-fallback {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
        color: #333;
      }
      #loading-fallback.error {
        background: #fff0f0;
        color: #c00;
        flex-direction: column;
        padding: 2rem;
        text-align: center;
      }
      #loading-fallback.hidden { display: none; }
      .dark #loading-fallback { background: #111; color: #eee; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="loading-fallback">
      <div>Loading Student Task Manager...</div>
    </div>
    <script>
      setTimeout(function() {
        var root = document.getElementById('root');
        var fallback = document.getElementById('loading-fallback');
        if (root && root.children.length === 0 && fallback) {
          fallback.className = 'error';
          fallback.innerHTML = 
            '<h2>App failed to load</h2>' +
            '<p>This is usually because the page was opened directly (file://) instead of through a web server.</p>' +
            '<p><strong>Fix:</strong> Run <code>npx vite preview</code> from the client folder, or run <code>npm run dev</code> from the root.</p>' +
            '<p>Check the browser console (F12) for the exact error.</p>';
        }
      }, 2000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
